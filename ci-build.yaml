name: CI Build

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Lint code
      run: |
        flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run unit tests
      run: |
        nosetests
